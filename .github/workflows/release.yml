name: Build (mac/win) + notarize (mac) + upload to OSS

on:
  push:
    # branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  UPDATE_BASE_PUBLIC: https://asynctest.oss-cn-shenzhen.aliyuncs.com/core/updates/public/
  UPDATE_BASE_INTERNAL: https://asynctest.oss-cn-shenzhen.aliyuncs.com/core/updates/internal/

jobs:
  mac:
    if: startsWith(github.ref, 'refs/tags/v')
    name: mac (${{ matrix.variant }} / ${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      # notarize 并行太高可能更慢/不稳定，先保守（你之后可改 1 或 4）
      max-parallel: 4
      matrix:
        variant: [public, internal]
        arch: [x64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache Electron + electron-builder downloads (mac)
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/Library/Caches/app-builder
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electronbuilder-${{ matrix.variant }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-electronbuilder-${{ matrix.variant }}-
            ${{ runner.os }}-electronbuilder-

      - name: Verify Electron caches (mac)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "== electron cache =="
          ls -lah ~/Library/Caches/electron 2>/dev/null || echo "missing: ~/Library/Caches/electron"
          echo "== electron-builder cache =="
          ls -lah ~/Library/Caches/electron-builder 2>/dev/null || echo "missing: ~/Library/Caches/electron-builder"
          echo "== ~/.cache (for reference) =="
          ls -lah ~/.cache 2>/dev/null || true
          echo "== find electron-builder cache candidates =="
          find ~ -maxdepth 4 -type d \( -iname "*electron-builder*" -o -iname "*electron*" \) 2>/dev/null | sed -n '1,120p'

      - name: Import macOS signing certificate (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          echo "$MAC_CERTS" | base64 --decode > /tmp/mac.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/mac.p12 -k build.keychain -P "$MAC_CERTS_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Compute build env
        id: env
        shell: bash
        run: |
          if [ "${{ matrix.variant }}" = "public" ]; then
            BASE="${UPDATE_BASE_PUBLIC}"
            echo "APP_ENV=public" >> $GITHUB_OUTPUT
            echo "VITE_UPDATE_URL=${BASE}" >> $GITHUB_OUTPUT
            echo "UPDATE_PUBLISH_URL=${BASE}mac/${{ matrix.arch }}/" >> $GITHUB_OUTPUT
            echo "VITE_MODE=production" >> $GITHUB_OUTPUT
          else
            BASE="${UPDATE_BASE_INTERNAL}"
            echo "APP_ENV=internal" >> $GITHUB_OUTPUT
            echo "VITE_UPDATE_URL=${BASE}" >> $GITHUB_OUTPUT
            echo "UPDATE_PUBLISH_URL=${BASE}mac/${{ matrix.arch }}/" >> $GITHUB_OUTPUT
            echo "VITE_MODE=internal" >> $GITHUB_OUTPUT
          fi

      - name: Setup Rust (mac)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Rust cache (mac)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-rust -> target
          key: mac-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('src-rust/Cargo.lock') }}

      - name: Build napi-rs addon (mac)
        shell: bash
        run: |
          set -euo pipefail
          cd src-rust
          yarn install --immutable

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            TARGET="aarch64-apple-darwin"
            EXPECT="arm64"
          else
            TARGET="x86_64-apple-darwin"
            EXPECT="x86_64"
          fi

          # 关键：显式指定 target
          npx napi build --platform --release --target "${TARGET}"

          echo "Built .node files:"
          ls -lh *.node || true

          echo "Arch check:"
          file *.node || true
          file *.node | grep -q "${EXPECT}" || (echo "Wrong arch .node built" && exit 1)

          strip -x *.node || true

      - name: Vite build
        shell: bash
        env:
          APP_ENV: ${{ steps.env.outputs.APP_ENV }}
          VITE_IS_ELECTRON: "true"
        run: |
          yarn vite build --mode ${{ steps.env.outputs.VITE_MODE }}

      - name: Write Apple API key to file (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          mkdir -p /tmp/apple
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > /tmp/apple/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          chmod 600 /tmp/apple/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Write update-config.json
        shell: bash
        env:
          VITE_UPDATE_URL: ${{ steps.env.outputs.VITE_UPDATE_URL }}
        run: |
          set -euo pipefail
          mkdir -p electron
          cat > electron/update-config.json <<EOF
          { "base": "${VITE_UPDATE_URL}" }
          EOF
          echo "Wrote electron/update-config.json:"
          cat electron/update-config.json

      - name: electron-builder (mac, no notarize)
        if: "!startsWith(github.ref, 'refs/tags/')"
        shell: bash
        env:
          APP_ENV: ${{ steps.env.outputs.APP_ENV }}
          VITE_UPDATE_URL: ${{ steps.env.outputs.VITE_UPDATE_URL }}
          UPDATE_PUBLISH_URL: ${{ steps.env.outputs.UPDATE_PUBLISH_URL }}
        run: |
          yarn electron-builder --mac --${{ matrix.arch }}

      - name: electron-builder (mac, notarize)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          APP_ENV: ${{ steps.env.outputs.APP_ENV }}
          VITE_UPDATE_URL: ${{ steps.env.outputs.VITE_UPDATE_URL }}
          UPDATE_PUBLISH_URL: ${{ steps.env.outputs.UPDATE_PUBLISH_URL }}
          APPLE_API_KEY: /tmp/apple/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          DEBUG: electron-builder,electron-notarize
        run: |
          yarn electron-builder --mac --${{ matrix.arch }}

      - name: List Electron caches after build (mac)
        if: always()
        shell: bash
        run: |
          echo "HOME=$HOME"
          for p in \
            "$HOME/Library/Caches/electron" \
            "$HOME/Library/Caches/electron-builder" \
            "$HOME/Library/Caches/app-builder" \
            "$HOME/.cache/electron" \
            "$HOME/.cache/electron-builder"
          do
            echo "== $p =="
            if [ -d "$p" ]; then
              du -sh "$p" || true
              find "$p" -maxdepth 2 -type f | head -n 40 || true
            else
              echo "NOT EXISTS"
            fi
          done

      - name: List dist before upload (mac)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          APP_ENV: ${{ steps.env.outputs.APP_ENV }}
        run: |
          set -euo pipefail
          echo "=== dist_electron tree (top) ==="
          find "dist_electron/${APP_ENV}" -maxdepth 4 -type f | sed -n '1,200p'

          echo "=== files in arch dir ==="
          DIST_DIR="dist_electron/${APP_ENV}/mac/${{ matrix.arch }}"
          ls -lah "$DIST_DIR" || true

          echo "=== grep other-arch artifacts ==="
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            ls "$DIST_DIR" | grep -E "x64|mac\.zip$" | sed -n '1,80p' || true
          else
            ls "$DIST_DIR" | grep -E "arm64" | sed -n '1,80p' || true
          fi

      # - name: Upload artifacts (mac)
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: mac-${{ matrix.variant }}-${{ matrix.arch }}
      #     path: dist_electron/${{ matrix.variant }}/
      #     if-no-files-found: error

      - name: Install ossutil (mac)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          # 官方一键安装脚本
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

          # 验证可执行是否可用
          if command -v ossutil >/dev/null 2>&1; then
            ossutil -v
          else
            echo "ossutil not found in PATH, debug paths:"
            ls -lh /usr/local/bin || true
            ls -lh /usr/bin || true
            /usr/local/bin/ossutil -v || /usr/bin/ossutil -v
          fi

      - name: Upload to OSS (mac, tags only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          APP_ENV: ${{ steps.env.outputs.APP_ENV }}
        run: |
          set -euo pipefail

          DIST_DIR="dist_electron/${APP_ENV}/mac/${{ matrix.arch }}/"
          echo "Cleaning up intermediate folders..."
          OSS_PREFIX="oss://${OSS_BUCKET}/core/updates/${APP_ENV}/mac/${{ matrix.arch }}/"

          echo "Uploading ${DIST_DIR} -> ${OSS_PREFIX}"
          ossutil cp -rf "${DIST_DIR}/" "${OSS_PREFIX}" \
            -e "${OSS_ENDPOINT}" \
            -i "${OSS_ACCESS_KEY_ID}" \
            -k "${OSS_ACCESS_KEY_SECRET}"

          # latest*.yml 覆盖且 no-cache（在这个 arch 子目录里覆盖即可）
          shopt -s nullglob
          for f in "${DIST_DIR}"/latest*.yml; do
            echo "Overwrite no-cache: $(basename "$f")"
            ossutil cp -f "$f" "${OSS_PREFIX}" \
              -e "${OSS_ENDPOINT}" \
              -i "${OSS_ACCESS_KEY_ID}" \
              -k "${OSS_ACCESS_KEY_SECRET}" \
              --meta "Cache-Control:no-cache"
          done

  win:
    if: startsWith(github.ref, 'refs/tags/v')
    name: win (${{ matrix.variant }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [public, internal]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Ensure cache dirs exist (win)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:LOCALAPPDATA\electron\Cache" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:LOCALAPPDATA\electron-builder\Cache" | Out-Null

      - name: Export cache paths (win)
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "ELECTRON_CACHE_DIR=$env:LOCALAPPDATA\electron\Cache"
          Add-Content -Path $env:GITHUB_ENV -Value "ELECTRON_BUILDER_CACHE_DIR=$env:LOCALAPPDATA\electron-builder\Cache"

      - name: Cache Electron + electron-builder downloads (win)
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE_DIR }}
            ${{ env.ELECTRON_BUILDER_CACHE_DIR }}
          key: ${{ runner.os }}-electronbuilder-${{ matrix.variant }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-electronbuilder-${{ matrix.variant }}-
            ${{ runner.os }}-electronbuilder-
      
      - name: Verify Electron caches (win)
        if: always()
        shell: pwsh
        run: |
          Write-Host "== electron cache =="
          Get-ChildItem "$env:LOCALAPPDATA\electron\Cache" -ErrorAction SilentlyContinue | Select-Object -First 20
          if (-not (Test-Path "$env:LOCALAPPDATA\electron\Cache")) { Write-Host "missing: $env:LOCALAPPDATA\electron\Cache" }

          Write-Host "== electron-builder cache =="
          Get-ChildItem "$env:LOCALAPPDATA\electron-builder\Cache" -ErrorAction SilentlyContinue | Select-Object -First 20
          if (-not (Test-Path "$env:LOCALAPPDATA\electron-builder\Cache")) { Write-Host "missing: $env:LOCALAPPDATA\electron-builder\Cache" }

          Write-Host "== find candidates under LOCALAPPDATA =="
          Get-ChildItem $env:LOCALAPPDATA -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "electron" } | Select-Object -First 50

      - name: Setup Rust (win)
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust cache (win)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-rust -> target
          key: win-${{ runner.os }}-x64-${{ hashFiles('src-rust/Cargo.lock') }}
          
      - name: Build napi-rs addon (win)
        shell: bash
        run: |
          cd src-rust
          yarn install --immutable
          yarn build --release
          strip -x *.node
          ls -lh *.node || true

      - name: Compute build env
        id: env
        shell: bash
        run: |
          if [ "${{ matrix.variant }}" = "public" ]; then
            BASE="${UPDATE_BASE_PUBLIC}"
            echo "APP_ENV=public" >> $GITHUB_OUTPUT
            echo "VITE_UPDATE_URL=${BASE}" >> $GITHUB_OUTPUT
            echo "UPDATE_PUBLISH_URL=${BASE}win/x64/" >> $GITHUB_OUTPUT
            echo "VITE_MODE=production" >> $GITHUB_OUTPUT
          else
            BASE="${UPDATE_BASE_INTERNAL}"
            echo "APP_ENV=internal" >> $GITHUB_OUTPUT
            echo "VITE_UPDATE_URL=${BASE}" >> $GITHUB_OUTPUT
            echo "UPDATE_PUBLISH_URL=${BASE}win/x64/" >> $GITHUB_OUTPUT
            echo "VITE_MODE=internal" >> $GITHUB_OUTPUT
          fi

      - name: Vite build
        shell: bash
        env:
          APP_ENV: ${{ steps.env.outputs.APP_ENV }}
          VITE_IS_ELECTRON: "true"
        run: |
          yarn vite build --mode ${{ steps.env.outputs.VITE_MODE }}

      - name: Write update-config.json
        shell: bash
        env:
          VITE_UPDATE_URL: ${{ steps.env.outputs.VITE_UPDATE_URL }}
        run: |
          set -euo pipefail
          mkdir -p electron
          cat > electron/update-config.json <<EOF
          { "base": "${VITE_UPDATE_URL}" }
          EOF
          echo "Wrote electron/update-config.json:"
          cat electron/update-config.json

      - name: electron-builder (win)
        shell: bash
        env:
          APP_ENV: ${{ steps.env.outputs.APP_ENV }}
          VITE_UPDATE_URL: ${{ steps.env.outputs.VITE_UPDATE_URL }}
          UPDATE_PUBLISH_URL: ${{ steps.env.outputs.UPDATE_PUBLISH_URL }}
        run: |
          yarn electron-builder --win --x64

      - name: List Electron caches after build (win)
        if: always()
        shell: pwsh
        run: |
          Write-Host "LOCALAPPDATA=$env:LOCALAPPDATA"
          $paths = @(
            "$env:LOCALAPPDATA\electron\Cache",
            "$env:LOCALAPPDATA\electron-builder\Cache"
          )
          foreach ($p in $paths) {
            Write-Host "== $p =="
            if (Test-Path $p) {
              Get-ChildItem $p -Recurse -ErrorAction SilentlyContinue | Select-Object -First 40
              $sum = (Get-ChildItem $p -Recurse -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum
              Write-Host "Bytes=$sum"
            } else {
              Write-Host "NOT EXISTS"
            }
          }

      # - name: Upload artifacts (win)
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: win-${{ matrix.variant }}-x64
      #     path: dist_electron/${{ matrix.variant }}/
      #     if-no-files-found: error

      - name: Install ossutil (win)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ossutilPath = "$env:RUNNER_TEMP\ossutil.exe"
          Invoke-WebRequest -Uri "https://gosspublic.alicdn.com/ossutil/1.7.16/ossutil64.exe" -OutFile $ossutilPath
          & $ossutilPath -v

      - name: Upload to OSS (win, tags only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          APP_ENV: ${{ steps.env.outputs.APP_ENV }}
        run: |
          $ossutil = "$env:RUNNER_TEMP\ossutil.exe"
          if (-not (Test-Path $ossutil)) { throw "ossutil not found at $ossutil" }

          $distDir = "dist_electron/$env:APP_ENV/win/x64/"
          Write-Host "Cleaning up intermediate folders..."
          Remove-Item -Path "$distDir/win-unpacked" -Recurse -Force -ErrorAction SilentlyContinue
          $ossPrefix = "oss://$env:OSS_BUCKET/core/updates/$env:APP_ENV/win/x64/"

          & $ossutil cp -rf "$distDir/" "$ossPrefix" -e "$env:OSS_ENDPOINT" -i "$env:OSS_ACCESS_KEY_ID" -k "$env:OSS_ACCESS_KEY_SECRET"

          Get-ChildItem "$distDir" -Filter "latest*.yml" | ForEach-Object {
            & $ossutil cp -f $_.FullName "$ossPrefix" -e "$env:OSS_ENDPOINT" -i "$env:OSS_ACCESS_KEY_ID" -k "$env:OSS_ACCESS_KEY_SECRET" --meta "Cache-Control:no-cache"
          }